<section class="deck" aria-label="Planning card deck">
  @for (card of cards(); track card) {
    <button
      type="button"
      class="card"
      [class.card--selected]="selectedCard() === card"
      [disabled]="disabled()"
      (click)="selectCard(card)"
    >
      {{ card }}
    </button>
  }

  @if (showClear()) {
    <button
      type="button"
      class="card card--clear"
      [disabled]="clearDisabled()"
      (click)="clearSelection()"
      aria-label="Clear vote"
    >
      X
    </button>
  }
</section>
